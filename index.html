<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Wesser Plan</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-providers/1.13.0/leaflet-providers.min.js"></script>
    <!-- Leaflet Draw -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

    <style>
      :root {
        --bg-main: #F8F9FE;
        --bg-sidebar: rgba(249, 247, 246, 0.8);
        --bg-card: rgba(255, 255, 255, 0.85);
        --bg-card-solid: #ffffff;
        --text-primary: #1a1a1a;
        --text-secondary: #5a5a5a;
        --text-muted: #94a3b8;
        --highlight-bg: #FFEFEB;
        --highlight-text: #FF5B2B;
        --highlight-bg-hover: #ffddd4;
        --border-color: rgba(255, 255, 255, 0.6);
        --border-subtle: #e2e8f0;
        --shadow-soft: 0 10px 40px rgba(0,0,0,.04);
        --radius-lg: 24px;
        --radius-md: 16px;
        --radius-sm: 12px;
        --input-bg: #ffffff;
        --input-border: #e2e8f0;
        color-scheme: light;
      }

      .dark {
        --bg-main: #0f111a;
        --bg-sidebar: rgba(17, 19, 30, 0.92);
        --bg-card: rgba(30, 33, 48, 0.85);
        --bg-card-solid: #1e2130;
        --text-primary: #e8eaed;
        --text-secondary: #9aa0b0;
        --text-muted: #5a6178;
        --highlight-bg: #2a1a15;
        --highlight-text: #ff7a52;
        --highlight-bg-hover: #3a2218;
        --border-color: rgba(255, 255, 255, 0.08);
        --border-subtle: rgba(255, 255, 255, 0.1);
        --shadow-soft: 0 10px 40px rgba(0,0,0,.2);
        --input-bg: #1a1d2e;
        --input-border: rgba(255, 255, 255, 0.12);
        color-scheme: dark;
      }

      html,body {
        margin:0;
        background-color: var(--bg-main);
        color: var(--text-primary);
        font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
        overflow-x: hidden;
        height: 100%;
      }

      /* Active Glassmorphism - Blob Animations */
      @keyframes blob-float-1 {
        0% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(50px, -30px) scale(1.1); }
        66% { transform: translate(-20px, 50px) scale(0.95); }
        100% { transform: translate(0, 0) scale(1); }
      }

      @keyframes blob-float-2 {
        0% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(-40px, 40px) scale(1.05); }
        66% { transform: translate(30px, -20px) scale(0.9); }
        100% { transform: translate(0, 0) scale(1); }
      }

      /* Blob 1: Navy, Top Right */
      body::before {
        content: ''; position: fixed; width: 800px; height: 800px; border-radius: 50%;
        background: radial-gradient(circle, rgba(59, 130, 246, 0.15), transparent 70%);
        top: -20%; right: -10%; z-index: -1; pointer-events: none;
        filter: blur(80px); opacity: 0.8;
        animation: blob-float-1 25s infinite ease-in-out;
      }
      .dark body::before {
        background: radial-gradient(circle, rgba(59, 130, 246, 0.08), transparent 70%);
        opacity: 0.5;
      }

      /* Blob 2: Purple, Bottom Left */
      body::after {
        content: ''; position: fixed; width: 700px; height: 700px; border-radius: 50%;
        background: radial-gradient(circle, rgba(147, 51, 234, 0.12), transparent 70%);
        bottom: -20%; left: -10%; z-index: -1; pointer-events: none;
        filter: blur(100px); opacity: 0.8;
        animation: blob-float-2 30s infinite ease-in-out reverse;
      }
      .dark body::after {
        background: radial-gradient(circle, rgba(147, 51, 234, 0.06), transparent 70%);
        opacity: 0.4;
      }

      .color-orb {
        position: absolute; top: 10%; left: 30%;
        width: 400px; height: 400px;
        background: radial-gradient(circle, rgba(245, 158, 11, 0.08), transparent 70%);
        border-radius: 50%; filter: blur(90px); z-index: -1; pointer-events: none;
        animation: blob-float-1 40s infinite ease-in-out reverse;
      }

      .glass-card {
        background: var(--bg-card);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-soft);
        transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1),
                    box-shadow 0.4s cubic-bezier(0.2, 0.8, 0.2, 1),
                    border-color 0.3s ease,
                    background-color 0.3s ease;
      }

      .glass-card:hover {
          transform: translateY(-6px) scale(1.005);
          box-shadow: 0 25px 50px -12px rgba(0,0,0,0.12);
          border-color: rgba(255, 255, 255, 0.9);
          background-color: rgba(255, 255, 255, 0.92);
      }

      .dark .glass-card {
        background: var(--bg-card);
        border-color: var(--border-color);
        box-shadow: var(--shadow-soft);
      }

      .dark .glass-card:hover {
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
        border-color: rgba(255, 255, 255, 0.15);
        background-color: rgba(30, 33, 48, 0.95);
      }

      #france-map, #wplan-map, #define-areas-map {
        height:100%;
        border-radius: var(--radius-lg);
        background: #e5e7eb;
      }
      .dark #france-map, .dark #wplan-map, .dark #define-areas-map {
        background: #1a1d2e;
      }

      .leaflet-tooltip {
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(0,0,0,0.05);
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        padding: 4px 8px;
      }
      .dark .leaflet-tooltip {
        background: rgba(30, 33, 48, 0.95);
        border-color: rgba(255,255,255,0.1);
        color: #e8eaed;
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      .dark ::-webkit-scrollbar-thumb { background: #3a3f54; }
      .dark ::-webkit-scrollbar-thumb:hover { background: #4a5070; }

      @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fade-in 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

      #nc-tab-nav {
        background: rgba(255,255,255,0.6); backdrop-filter: blur(12px);
        border: 1px solid var(--border-color); box-shadow: var(--shadow-soft);
      }
      .dark #nc-tab-nav {
        background: rgba(30, 33, 48, 0.6);
      }

      .commune-card { transition: all 0.3s cubic-bezier(0.25,0.8,0.25,1); }

      .tooltip-zone {
        background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      }
      .dark .tooltip-zone {
        background-color: rgba(30, 33, 48, 0.95);
        border-color: rgba(255,255,255,0.1);
      }

      /* Smooth theme transition */
      html.theme-transition, html.theme-transition *, html.theme-transition *::before, html.theme-transition *::after {
        transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease !important;
      }

      /* TeamPlanner dark scrollbar (scoped) */
      .team-planner-board::-webkit-scrollbar { width: 8px; height: 8px; }
      .team-planner-board::-webkit-scrollbar-track { background: #2d2d2d; }
      .team-planner-board::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
      .team-planner-board::-webkit-scrollbar-thumb:hover { background: #666; }

      .custom-scrollbar-light::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar-light::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar-light::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      .custom-scrollbar-light::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* Zone Maker map styles */
      .leaflet-container {
        font-family: 'Inter', sans-serif;
      }

      /* Mobile safe areas for notched phones */
      .safe-area-top {
        padding-top: env(safe-area-inset-top, 0px);
      }
      .safe-area-bottom {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }

      /* ========================================
         DARK MODE: Colored background overrides
         These fix all colored badges/pills/backgrounds
         that use hardcoded light-mode Tailwind classes
         ======================================== */
      .dark .bg-blue-50 { background-color: rgba(59, 130, 246, 0.12) !important; }
      .dark .bg-blue-100 { background-color: rgba(59, 130, 246, 0.18) !important; }
      .dark .bg-green-50 { background-color: rgba(34, 197, 94, 0.12) !important; }
      .dark .bg-green-100 { background-color: rgba(34, 197, 94, 0.18) !important; }
      .dark .bg-red-50 { background-color: rgba(239, 68, 68, 0.12) !important; }
      .dark .bg-red-100 { background-color: rgba(239, 68, 68, 0.18) !important; }
      .dark .bg-amber-50 { background-color: rgba(245, 158, 11, 0.12) !important; }
      .dark .bg-amber-100 { background-color: rgba(245, 158, 11, 0.18) !important; }
      .dark .bg-orange-50 { background-color: rgba(249, 115, 22, 0.12) !important; }
      .dark .bg-orange-100 { background-color: rgba(249, 115, 22, 0.18) !important; }
      .dark .bg-emerald-50 { background-color: rgba(16, 185, 129, 0.12) !important; }
      .dark .bg-emerald-100 { background-color: rgba(16, 185, 129, 0.18) !important; }
      .dark .bg-indigo-50 { background-color: rgba(99, 102, 241, 0.12) !important; }
      .dark .bg-indigo-100 { background-color: rgba(99, 102, 241, 0.18) !important; }
      .dark .bg-purple-50 { background-color: rgba(168, 85, 247, 0.12) !important; }
      .dark .bg-purple-100 { background-color: rgba(168, 85, 247, 0.18) !important; }
      .dark .bg-yellow-50 { background-color: rgba(234, 179, 8, 0.10) !important; }
      .dark .bg-yellow-100 { background-color: rgba(234, 179, 8, 0.16) !important; }
      .dark .bg-slate-50 { background-color: rgba(30, 33, 48, 0.6) !important; }
      .dark .bg-slate-100 { background-color: rgba(30, 33, 48, 0.8) !important; }
      .dark .bg-gray-50 { background-color: rgba(30, 33, 48, 0.6) !important; }
      .dark .bg-gray-100 { background-color: rgba(30, 33, 48, 0.8) !important; }

      /* Dark mode: colored text adjustments for readability */
      .dark .text-blue-700 { color: #93bbfd !important; }
      .dark .text-blue-800 { color: #93bbfd !important; }
      .dark .text-green-700 { color: #6ee7b7 !important; }
      .dark .text-green-800 { color: #6ee7b7 !important; }
      .dark .text-red-700 { color: #fca5a5 !important; }
      .dark .text-red-800 { color: #fca5a5 !important; }
      .dark .text-amber-700 { color: #fbbf24 !important; }
      .dark .text-orange-700, .dark .text-orange-800, .dark .text-orange-900 { color: #fdba74 !important; }
      .dark .text-indigo-700 { color: #a5b4fc !important; }
      .dark .text-emerald-700 { color: #6ee7b7 !important; }
      .dark .text-slate-600 { color: #9aa0b0 !important; }

      /* Dark mode: border color overrides */
      .dark .border-blue-100, .dark .border-blue-200 { border-color: rgba(59, 130, 246, 0.2) !important; }
      .dark .border-green-100, .dark .border-green-200 { border-color: rgba(34, 197, 94, 0.2) !important; }
      .dark .border-red-100, .dark .border-red-200 { border-color: rgba(239, 68, 68, 0.2) !important; }
      .dark .border-amber-100, .dark .border-amber-200 { border-color: rgba(245, 158, 11, 0.2) !important; }
      .dark .border-orange-100, .dark .border-orange-200 { border-color: rgba(249, 115, 22, 0.2) !important; }
      .dark .border-yellow-100, .dark .border-yellow-200 { border-color: rgba(234, 179, 8, 0.2) !important; }
      .dark .border-slate-50 { border-color: rgba(255, 255, 255, 0.05) !important; }
      .dark .border-slate-100 { border-color: rgba(255, 255, 255, 0.08) !important; }
      .dark .border-slate-200 { border-color: rgba(255, 255, 255, 0.1) !important; }
      .dark .border-slate-300 { border-color: rgba(255, 255, 255, 0.15) !important; }
      .dark .border-gray-200 { border-color: rgba(255, 255, 255, 0.1) !important; }
      .dark .border-gray-300 { border-color: rgba(255, 255, 255, 0.15) !important; }

      /* Dark mode: hover state overrides */
      .dark .hover\:bg-slate-50:hover { background-color: rgba(30, 33, 48, 0.6) !important; }
      .dark .hover\:bg-slate-100:hover { background-color: rgba(30, 33, 48, 0.8) !important; }
      .dark .hover\:bg-slate-200:hover { background-color: rgba(45, 48, 65, 0.8) !important; }
      .dark .hover\:bg-gray-50:hover { background-color: rgba(30, 33, 48, 0.6) !important; }
      .dark .hover\:bg-blue-50:hover { background-color: rgba(59, 130, 246, 0.15) !important; }
      .dark .hover\:bg-red-50:hover { background-color: rgba(239, 68, 68, 0.15) !important; }
      .dark .hover\:bg-blue-100:hover { background-color: rgba(59, 130, 246, 0.22) !important; }
      .dark .hover\:bg-blue-200:hover { background-color: rgba(59, 130, 246, 0.28) !important; }
      .dark .hover\:bg-green-100:hover { background-color: rgba(34, 197, 94, 0.22) !important; }
      .dark .hover\:bg-red-100:hover { background-color: rgba(239, 68, 68, 0.22) !important; }
      .dark .hover\:bg-red-200:hover { background-color: rgba(239, 68, 68, 0.28) !important; }
      .dark .hover\:bg-yellow-50:hover { background-color: rgba(234, 179, 8, 0.15) !important; }
      .dark .hover\:bg-purple-50:hover { background-color: rgba(168, 85, 247, 0.15) !important; }

      /* Dark mode: input and form fields */
      .dark input, .dark select, .dark textarea {
        background-color: var(--input-bg) !important;
        border-color: var(--input-border) !important;
        color: var(--text-primary) !important;
      }
      .dark input::placeholder, .dark textarea::placeholder {
        color: var(--text-muted) !important;
      }
      .dark input:focus, .dark select:focus, .dark textarea:focus {
        border-color: rgba(59, 130, 246, 0.5) !important;
      }
      .dark option {
        background-color: var(--bg-card-solid) !important;
        color: var(--text-primary) !important;
      }

      /* Dark mode: leaflet controls */
      .dark .leaflet-control-zoom a {
        background-color: var(--bg-card-solid) !important;
        color: var(--text-primary) !important;
        border-color: var(--border-color) !important;
      }
      .dark .leaflet-control-zoom a:hover {
        background-color: #2a2d42 !important;
      }
      .dark .leaflet-bar {
        border-color: var(--border-color) !important;
      }

      /* Touch-friendly improvements */
      @media (max-width: 767px) {
        /* Prevent text selection on interactive elements */
        button, a, nav { -webkit-user-select: none; user-select: none; }

        /* Larger touch targets */
        .glass-card { border-radius: 16px; }
        .glass-card:hover { transform: none; }

        /* Fix leaflet popups on mobile */
        .leaflet-popup-content { min-width: 200px !important; max-width: 280px !important; }
        .leaflet-popup-content-wrapper { border-radius: 16px !important; }
        .dark .leaflet-popup-content-wrapper { background: var(--bg-card-solid) !important; color: var(--text-primary) !important; }
        .dark .leaflet-popup-tip { background: var(--bg-card-solid) !important; }

        /* Prevent overscroll bounce */
        html { overscroll-behavior: none; }

        /* Zone planner sidebar: full width on mobile */
        .zone-planner-sidebar { width: 100% !important; min-width: unset !important; max-height: 50vh; }

        /* Hide blobs on mobile for performance */
        body::before, body::after, .color-orb { display: none; }

        /* Modals: ensure full-screen on mobile */
        .fixed.inset-0 > div[class*="max-w-"] {
          max-width: 100% !important;
          margin: 0 !important;
          border-radius: 0 !important;
          max-height: 100vh !important;
          height: 100% !important;
        }

        /* Ensure proper spacing for bottom nav */
        main { padding-bottom: 5rem !important; }

        /* Cards and grids: stack on mobile */
        .grid-cols-3, .grid-cols-4 {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        .grid-cols-3 > .col-span-full,
        .grid-cols-4 > .col-span-full {
          grid-column: 1 / -1 !important;
        }

        /* Prevent horizontal overflow */
        .overflow-x-auto { -webkit-overflow-scrolling: touch; }

        /* Better font sizes on mobile */
        .text-4xl { font-size: 1.75rem !important; }
        .text-3xl { font-size: 1.5rem !important; }
      }

      /* Smooth scrolling on iOS */
      @supports (-webkit-touch-callout: none) {
        .overflow-y-auto { -webkit-overflow-scrolling: touch; }
      }
    </style>
</head>
<body class="min-h-screen">
    <script>
      // Restore theme before render to prevent flash
      (function() {
        var t = localStorage.getItem('wesserplan-theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var d = document.getElementById('root');
        if (d && !d.innerHTML) {
          d.innerHTML = '<div style="padding:40px;font-family:Inter,sans-serif"><h1 style="color:#ef4444">Erreur JS</h1><pre style="background:#f1f5f9;padding:16px;border-radius:8px;overflow:auto;white-space:pre-wrap">' + msg + '\n\nSource: ' + src + '\nLine: ' + line + '\nCol: ' + col + (err && err.stack ? '\n\n' + err.stack : '') + '</pre></div>';
        }
      };
      window.addEventListener('unhandledrejection', function(e) {
        var d = document.getElementById('root');
        if (d && !d.innerHTML) {
          d.innerHTML = '<div style="padding:40px;font-family:Inter,sans-serif"><h1 style="color:#ef4444">Erreur Promise</h1><pre style="background:#f1f5f9;padding:16px;border-radius:8px;overflow:auto;white-space:pre-wrap">' + (e.reason && e.reason.stack || e.reason || 'Unknown') + '</pre></div>';
        }
      });
      setTimeout(function() {
        var d = document.getElementById('root');
        if (d && !d.innerHTML) {
          d.innerHTML = '<div style="padding:40px;font-family:Inter,sans-serif"><h1 style="color:#f59e0b">App non chargee</h1><p>Le JavaScript n\'a pas reussi a se charger en 10 secondes.</p><p>Ouvrez la console (F12) pour voir l\'erreur.</p></div>';
        }
      }, 10000);
    </script>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
